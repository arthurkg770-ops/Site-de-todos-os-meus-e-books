<style>
:root{
  --gold:#d4af37;
  --bg:#050505;
  --card:#0f0f0f;
  --border:#222;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:var(--bg);
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:100px 20px;
  background:radial-gradient(circle at top,#1a1a1a,#000);
  border-bottom:1px solid var(--gold);
}

header h1{
  font-size:60px;
  color:var(--gold);
}

header p{
  opacity:0.7;
  margin-top:10px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:50px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  transition:0.3s ease;
  cursor:pointer;
  position:relative;
}

.card:hover{
  transform:translateY(-8px);
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(212,175,55,0.15);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  filter:brightness(0.85);
}

/* CONTENT */
.content{
  padding:15px;
}

.title{
  color:var(--gold);
  font-weight:bold;
  font-size:15px;
}

.desc{
  font-size:13px;
  opacity:0.7;
  margin:8px 0;
}

.btn{
  display:block;
  text-align:center;
  padding:10px;
  background:var(--gold);
  color:#000;
  font-weight:bold;
  text-decoration:none;
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  background:#000;
  border-top:1px solid var(--gold);
  font-size:12px;
  opacity:0.6;
}

/* 🔐 MODAL (CORRIGIDO E MAIS PROFISSIONAL) */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:20px;
}

.modal-box{
  background:#111;
  border:1px solid var(--gold);
  border-radius:14px;
  padding:20px;
  max-width:420px;
  width:100%;
  text-align:center;
  animation:fade 0.2s ease-in-out;
}

@keyframes fade{
  from{transform:scale(0.9); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.modal-box h2{
  color:var(--gold);
  margin-bottom:10px;
}

.modal-box p{
  font-size:14px;
  opacity:0.8;
  line-height:1.4;
}

.close{
  margin-top:15px;
  padding:10px;
  background:var(--gold);
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}
</style>

</head>

<script>
// 🔐 MODAL SEGURO E ESTÁVEL
function openModal(title, text){
  const modal = document.getElementById('modal');
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalText').innerText = text;
  modal.style.display = 'flex';
}

// FECHAR MODAL
function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

// FECHAR AO CLICAR FORA
window.onclick = function(e){
  const modal = document.getElementById('modal');
  if(e.target === modal){
    modal.style.display = 'none';
  }
}
</script>
