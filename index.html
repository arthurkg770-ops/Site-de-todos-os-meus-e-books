<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite E-books</title>

<style>
:root{
--gold:#d4af37;
--bg:#050505;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--bg);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:90px 20px;
background:radial-gradient(circle,#1a1a1a,#000);
border-bottom:1px solid var(--gold);
}

header h1{
font-size:50px;
color:var(--gold);
}

/* INPUT */
input{
padding:12px;
width:260px;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:40px;
position:relative;
}

/* OVERLAY BLOQUEIO */
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.92);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:5;
}

.overlay h2{
color:var(--gold);
margin-bottom:10px;
}

/* CARD */
.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:var(--gold);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
color:var(--gold);
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
background:#111;
border:1px solid var(--gold);
padding:25px;
border-radius:12px;
max-width:500px;
}

.buy{
display:block;
margin-top:15px;
padding:12px;
background:var(--gold);
color:black;
text-align:center;
text-decoration:none;
font-weight:bold;
border-radius:8px;
}

.close{
margin-top:10px;
padding:10px;
background:#333;
border:none;
color:white;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🏛 Elite E-books</h1>
<p>Digite um e-mail válido para liberar</p>
</header>

<div class="container">

<!-- BLOQUEIO -->
<div class="overlay" id="lock">
<h2>Digite seu e-mail</h2>

<input type="email" id="email" placeholder="seuemail@gmail.com">
<br><br>
<button onclick="unlock()">LIBERAR ACESSO</button>

</div>

<!-- EBOOK -->
<div class="card" onclick="openModal(
'Renda com Milhas',
'Aprenda a transformar milhas em dinheiro real com estratégias completas.',
'https://arthurkg770-ops.github.io/Manual-da-Renda-com-Milhas-/'
)">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="content">
<div class="title">✈️ Renda com Milhas</div>
</div>
</div>

<div class="card" onclick="openModal(
'IA para Autônomos',
'Use inteligência artificial para criar renda online e automatizar serviços.',
'https://arthurkg770-ops.github.io/Guia-Pr-tico-de-Intelig-ncia-Artificial-para-Aut-nomos-Prestadores-de-Servi-o-/'
)">
<img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">
<div class="content">
<div class="title">🤖 IA para Autônomos</div>
</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h2 id="title"></h2>
<p id="text"></p>

<a id="buy" class="buy" target="_blank">
COMPRAR AGORA
</a>

<button class="close" onclick="closeModal()">FECHAR</button>

</div>
</div>

<script>

// VALIDA EMAIL REAL
function validarEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function unlock(){
let email = document.getElementById("email").value;

if(!validarEmail(email)){
alert("Digite um e-mail válido");
return;
}

document.getElementById("lock").style.display="none";
}

// MODAL
function openModal(title,text,link){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=title;
document.getElementById("text").innerText=text;
document.getElementById("buy").href=link;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target.id==="modal"){
closeModal()
}
}

</script>

</body>
</html>
