<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Portal</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
    text-align:center;
}

h1{
    color:gold;
    margin-top:30px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:15px;
    max-width:400px;
    margin:40px auto;
}

a{
    background:gold;
    color:black;
    padding:15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    background:white;
}
</style>
</head>

<body>

<h1>🌐 Meu Portal de Sites</h1>

<div class="container">

<a href="https://google.com" target="_blank">Google</a>
<a href="https://youtube.com" target="_blank">YouTube</a>
<a href="https://instagram.com" target="_blank">Instagram</a>

</div>

</body>
</html>
