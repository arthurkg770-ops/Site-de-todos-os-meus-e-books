<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite E-books</title>

<style>
:root{
--gold:#d4af37;
--bg:#050505;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--bg);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:90px 20px;
background:radial-gradient(circle,#1a1a1a,#000);
border-bottom:1px solid var(--gold);
}

header h1{
font-size:50px;
color:var(--gold);
}

input{
padding:12px;
width:260px;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

/* LOCK */
.locked{
filter:blur(5px);
pointer-events:none;
opacity:.4;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:var(--gold);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
color:var(--gold);
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
background:#111;
border:1px solid var(--gold);
padding:25px;
border-radius:12px;
max-width:500px;
}

.modal-box h2{
color:var(--gold);
}

.modal-box p{
margin-top:10px;
line-height:1.5;
opacity:.85;
}

.buy{
margin-top:15px;
display:block;
text-align:center;
padding:12px;
background:var(--gold);
color:black;
font-weight:bold;
text-decoration:none;
border-radius:8px;
}

.close{
margin-top:10px;
padding:10px;
background:#333;
border:none;
color:white;
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>🏛 Elite E-books</h1>
<p>Digite seu e-mail para liberar os e-books</p>

<input type="email" id="email" placeholder="Seu e-mail">
<br><br>
<button onclick="unlock()">LIBERAR ACESSO</button>

</header>

<!-- EBOOKS -->
<div class="container locked" id="ebooks">

<div class="card" onclick="openModal(
'Renda com Milhas',
'Aprenda a transformar milhas em dinheiro real. Estratégias completas para iniciantes e avançados.',
'https://arthurkg770-ops.github.io/Manual-da-Renda-com-Milhas-/'
)">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="content">
<div class="title">✈️ Renda com Milhas</div>
</div>
</div>

<div class="card" onclick="openModal(
'IA para Autônomos',
'Use inteligência artificial para criar serviços e ganhar dinheiro online.',
'https://arthurkg770-ops.github.io/Guia-Pr-tico-de-Intelig-ncia-Artificial-para-Aut-nomos-Prestadores-de-Servi-o-/'
)">
<img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">
<div class="content">
<div class="title">🤖 IA para Autônomos</div>
</div>
</div>

<div class="card" onclick="openModal(
'Instagram do Zero',
'Cresça no Instagram com estratégias virais e monetização.',
'https://arthurkg770-ops.github.io/Como-Crescer-no-Instagram-do-Zero/'
)">
<img src="https://images.unsplash.com/photo-1557804506-669a67965ba0">
<div class="content">
<div class="title">📘 Instagram do Zero</div>
</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h2 id="title"></h2>
<p id="text"></p>

<a id="buy" class="buy" target="_blank">
COMPRAR AGORA
</a>

<button class="close" onclick="closeModal()">FECHAR</button>

</div>
</div>

<script>

function unlock(){
let email = document.getElementById("email").value;

if(!email){
alert("Digite seu e-mail");
return;
}

document.getElementById("ebooks").classList.remove("locked");
}

function openModal(title,text,link){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=title;
document.getElementById("text").innerText=text;
document.getElementById("buy").href=link;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target.id==="modal"){
closeModal()
}
}

</script>

</body>
</html>
