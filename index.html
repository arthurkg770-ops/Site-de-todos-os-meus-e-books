<style>
:root{
--gold:#d4af37;
--bg:#050505;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:var(--bg);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:80px 20px;
background:radial-gradient(circle,#1a1a1a,#000);
border-bottom:1px solid var(--gold);
}

header h1{
font-size:50px;
color:var(--gold);
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:40px;
position:relative;
}

/* BLOQUEIO */
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.94);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:5;
}

.overlay input{
padding:12px;
width:260px;
border:none;
border-radius:8px;
}

.overlay button{
margin-top:10px;
padding:12px 20px;
background:var(--gold);
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

/* CARD */
.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:var(--gold);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.content{
padding:15px;
}

.title{
color:var(--gold);
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
background:#111;
border:1px solid var(--gold);
padding:25px;
border-radius:12px;
max-width:500px;
width:100%;
}

.buy{
display:block;
margin-top:15px;
padding:12px;
background:var(--gold);
color:black;
text-align:center;
text-decoration:none;
font-weight:bold;
border-radius:8px;
}

.close{
margin-top:10px;
padding:10px;
background:#333;
border:none;
color:white;
width:100%;
cursor:pointer;
}
</style>
</head>

<script>
function validarEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function unlock(){
let email=document.getElementById("email").value;
if(!validarEmail(email)){
alert("Digite um e-mail válido");
return;
}
document.getElementById("lock").style.display="none";
}

function openModal(title,text,link){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=title;
document.getElementById("text").innerText=text;
document.getElementById("buy").href=link;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target.id==="modal") closeModal();
}
</script>
