<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Premium</title>

<meta name="description" content="E-books sobre dinheiro, IA e marketing digital">
<meta name="referrer" content="no-referrer">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:#fff;
}

header{
  text-align:center;
  padding:50px 20px;
  border-bottom:1px solid #333;
}

h1{
  color:#d4af37;
  font-family:Playfair Display;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:30px;
}

.card{
  background:#111;
  border:1px solid #333;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.card h2{
  color:#d4af37;
  font-size:16px;
}

.card a{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:#d4af37;
  color:#000;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

.card a:hover{
  background:#b8922e;
}
</style>
</head>

<body>

<header>
  <h1>Biblioteca Premium</h1>
  <p>E-books de renda digital</p>
</header>

<div class="container">

  <div class="card">
    <h2>Renda com Milhas</h2>
    <a href="https://arthurkg770-ops.github.io/Manual-da-Renda-com-Milhas-/" target="_blank">Acessar</a>
  </div>

  <div class="card">
    <h2>IA para Autônomos</h2>
    <a href="https://arthurkg770-ops.github.io/Guia-Pr-tico-de-Intelig-ncia-Artificial-para-Aut-nomos-Prestadores-de-Servi-o-/" target="_blank">Acessar</a>
  </div>

  <div class="card">
    <h2>Emagrecimento</h2>
    <a href="https://arthurkg770-ops.github.io/101-Dicas-para-Emagrecer/" target="_blank">Acessar</a>
  </div>

</div>

</body>
</html>
