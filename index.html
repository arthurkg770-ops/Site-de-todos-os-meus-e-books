<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite E-books</title>

<!-- Segurança básica -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">

<style>
:root{
--gold:#d4af37;
--bg:#050505;
--card:#0f0f0f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:var(--bg);
color:white;
}

/* HERO */
.hero{
text-align:center;
padding:70px 20px;
background:linear-gradient(180deg,#111,#000);
border-bottom:1px solid rgba(212,175,55,.3);
}

.hero h1{
color:var(--gold);
font-size:42px;
margin-bottom:10px;
}

.hero p{
opacity:.8;
margin-bottom:20px;
}

/* EMAIL */
.email-box{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.email-box input{
padding:14px;
width:260px;
border:none;
border-radius:8px;
}

.email-box button{
padding:14px 25px;
background:var(--gold);
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* GRID */
.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
position:relative;
}

/* LOCK */
.lock{
position:absolute;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:5;
}

/* CARD */
.card{
background:var(--card);
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.3s;
border:1px solid #1a1a1a;
position:relative;
}

.card:hover{
transform:translateY(-6px);
border-color:var(--gold);
}

.badge{
position:absolute;
top:10px;
left:10px;
background:var(--gold);
color:black;
font-size:12px;
padding:4px 8px;
border-radius:6px;
font-weight:bold;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.title{
color:var(--gold);
font-size:14px;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
background:#111;
border:1px solid var(--gold);
padding:25px;
border-radius:12px;
max-width:520px;
width:100%;
}

.btn{
display:block;
margin-top:15px;
background:var(--gold);
color:black;
text-align:center;
padding:12px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.close{
margin-top:10px;
background:#333;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
border-radius:8px;
}

footer{
text-align:center;
padding:30px;
opacity:.6;
}
</style>
</head>

<body>

<section class="hero">
<h1>🏛 Elite E-books Premium</h1>
<p>Digite um e-mail válido para liberar todos os e-books</p>

<div class="email-box">
<input type="email" id="email" placeholder="seuemail@gmail.com">
<button onclick="unlock()">LIBERAR ACESSO</button>
</div>
</section>

<div class="container" id="grid">

<div class="lock" id="lock">
<h2 style="color:#d4af37">Acesso bloqueado</h2>
<p>Digite seu e-mail acima</p>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-box">
<h2 id="title"></h2>
<p id="text"></p>
<a id="link" target="_blank" class="btn">VER E-BOOK</a>
<button class="close" onclick="closeModal()">FECHAR</button>
</div>
</div>

<footer>
© 2026 Elite E-books
</footer>

<script>

const ebooks = [
["✈️ Manual da Renda com Milhas","Aprenda a transformar milhas em dinheiro.","https://arthurkg770-ops.github.io/Manual-da-Renda-com-Milhas-/"],
["🤖 Guia Prático de Inteligência Artificial para Autônomos (Prestadores de Serviço)","Use IA para gerar renda.","https://arthurkg770-ops.github.io/Guia-Pr-tico-de-Intelig-ncia-Artificial-para-Aut-nomos-Prestadores-de-Servi-o-/"],
["🏋️ 101 Dicas para Emagrecer","Dicas práticas para emagrecer.","https://arthurkg770-ops.github.io/101-Dicas-para-Emagrecer/"],
["💰 101 Dicas Para Vender Infoprodutos","Venda infoprodutos todos os dias.","https://arthurkg770-ops.github.io/101-Dicas-Para-Vender-Infoprodutos/#comprar"],
["🤖 COMO USAR IA PARA GANHAR DINHEIRO (ChatGPT e Ferramentas)","Ganhe dinheiro com IA.","https://arthurkg770-ops.github.io/COMO-USAR-IA-PARA-GANHAR-DINHEIRO-ChatGPT-e-Ferramentas-/"],
["📘 Como Crescer no Instagram do Zero","Cresça no Instagram.","https://arthurkg770-ops.github.io/Como-Crescer-no-Instagram-do-Zero/"],
["💰 Como Ganhar Dinheiro com Celular do Zero (Sem Aparecer)","Ganhe dinheiro com celular.","https://arthurkg770-ops.github.io/Como-ganhar-dinheiro-com-celular-do-zero-sem-aparecer-/"],
["💰 Primeira Venda em 7 Dias","Faça sua primeira venda.","https://arthurkg770-ops.github.io/Como-Fazer-Sua-Primeira-Venda-na-Internet-em-7-Dias-ebook-e-descri-ao/"],
["💰 101 Ideias de Renda Extra Sem Investir","Ideias de renda extra.","https://arthurkg770-ops.github.io/101-Ideias-de-Renda-Extra-Sem-Investir/"],
["📘 Como Crescer no TikTok Rápido (e Viralizar Vídeos)","Cresça no TikTok.","https://arthurkg770-ops.github.io/Como-Crescer-no-TikTok-R-pido-e-Viralizar-V-deos/"]
];

const grid=document.getElementById("grid");

ebooks.forEach(e=>{
grid.innerHTML+=`
<div class="card" onclick="openModal('${e[0]}','${e[1]}','${e[2]}')">
<div class="badge">49,90 → 19,90</div>
<img src="https://picsum.photos/400/300?random=${Math.random()}">
<div class="card-content">
<div class="title">${e[0]}</div>
</div>
</div>
`;
});

function validarEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function unlock(){
let email=document.getElementById("email").value;
if(!validarEmail(email)){
alert("Digite um e-mail válido");
return;
}
document.getElementById("lock").style.display="none";
}

function openModal(t,d,l){
modal.style.display="flex";
title.innerText=t;
text.innerText=d;
link.href=l;
}

function closeModal(){
modal.style.display="none";
}

</script>

</body>
</html>
